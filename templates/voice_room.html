<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspect's Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/favicon.png') }}">
</head>
<footer class="site-footer">
  <div class="footer-left">
    <a href="https://store.legitimoose.com" target="_blank" rel="noopener noreferrer">
        <img src="{{ url_for('static', filename='icons/cart.svg') }}" alt="Store" width="64" height="64">
    </a>
  </div>

  <div class="footer-center">
    <p>
      This is not an official Moose project and is made by the community.<br>
      We have no affiliation with any real-world brands.<br>
      Not affiliated with Mojang AB or Partners.
    </p>
  </div>

  <div class="footer-right">
    <a href="https://www.youtube.com/@Legitimoose" target="_blank" rel="noopener noreferrer">
        <img src="{{ url_for('static', filename='icons/youtube.svg') }}" alt="YouTube" width="64" height="64">
    </a>
  </div>
</footer>

<body>
    <nav class="navbar">
        <div class="logo">
            <a href="https://aspectofthe.site/" class="logo">
                <img src="{{ url_for('static', filename='icons/favicon.png') }}" alt="Logo" class="logo-img">
            </a>
            Aspect's Site
        </div>
    </nav>

    <h2>Voice Room</h2>
    <h3 id="world-uuid-text">{{ world_uuid }}</h3>
    <p id="local-player-text">{{ mc_uuid }}</p>
    <p>Voice Chat for legitimoose.com</p>
    <div id="voice-controls" style="margin: 10px 0;">
        <button class="generic" id="mute-btn">Mute</button>
        <button class="generic" id="deafen-btn">Deafen</button>
        <label for="mic-select">Mic:</label>
        <select class="dropdown" id="mic-select"></select>
    </div>
    
    <div id="connected-users" style="margin-top: 10px;">
        <h4>Connected Users</h4>
    </div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {

const world_uuid = "{{ world_uuid }}";
const mc_uuid = "{{ mc_uuid }}";
const authToken = "{{ auth }}";

const socket = io("https://aspectofthe.site", { transports: ["websocket"] });
const connectedUsers = document.getElementById("connected-users");

const players = new Map();
const remoteAudio = new Map();
const remoteAudioStreams = new Map();
const localPlayer = {
    uuid: mc_uuid,
    name: "You",
    position: [0, 0, 0],
    rotation: [0, 0]
};

let localStream = null;
let mediaRecorder = null;
let recorderBitrate = 0;
let recorderMimeType = "audio/webm;codecs=opus";
let isMuted = false;
let isDeafened = false;

function ensureAudioContext() {
    if (!window.AudioContext && !window.webkitAudioContext) {
        return null;
    }

    if (!window.__voiceAudioContext) {
        window.__voiceAudioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (window.__voiceAudioContext.state === "suspended") {
        window.__voiceAudioContext.resume().catch(console.error);
    }

    return window.__voiceAudioContext;
}

function stopRecorder() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }
}

function normalizeMimeType(mimeType) {
    if (typeof mimeType === "string" && mimeType.trim()) {
        return mimeType.trim();
    }

    return "audio/webm;codecs=opus";
}

function pickSupportedMimeType(preferred) {
    const candidates = [
        normalizeMimeType(preferred),
        "audio/webm;codecs=opus",
        "audio/ogg;codecs=opus"
    ];

    if (!window.MediaSource || typeof MediaSource.isTypeSupported !== "function") {
        return null;
    }

    return candidates.find(type => MediaSource.isTypeSupported(type)) || null;
}

function appendStreamChunk(peerUUID) {
    const state = remoteAudioStreams.get(peerUUID);
    if (!state || !state.sourceBuffer || state.sourceBuffer.updating) {
        return;
    }

    const nextChunk = state.queue.shift();
    if (!nextChunk) {
        return;
    }

    try {
        state.sourceBuffer.appendBuffer(nextChunk);
    } catch (err) {
        console.warn("Failed to append remote audio chunk", err);
    }
}

function destroyRemoteStream(peerUUID) {
    const state = remoteAudioStreams.get(peerUUID);
    if (!state) {
        return;
    }

    try {
        if (state.audio) {
            state.audio.pause();
            state.audio.src = "";
        }
    } catch (_) {}

    if (state.objectUrl) {
        URL.revokeObjectURL(state.objectUrl);
    }

    remoteAudioStreams.delete(peerUUID);
    remoteAudio.delete(peerUUID);
}

function getOrCreateRemoteState(peerUUID, requestedMimeType) {
    const supportedMimeType = pickSupportedMimeType(requestedMimeType);
    if (!supportedMimeType) {
        return null;
    }

    const existing = remoteAudioStreams.get(peerUUID);
    if (existing && existing.mimeType === supportedMimeType) {
        return existing;
    }

    if (existing) {
        destroyRemoteStream(peerUUID);
    }

    const mediaSource = new MediaSource();
    const objectUrl = URL.createObjectURL(mediaSource);
    const audio = new Audio(objectUrl);
    audio.autoplay = true;
    audio.muted = isDeafened;
    audio.volume = 1;

    const state = {
        mimeType: supportedMimeType,
        mediaSource,
        sourceBuffer: null,
        queue: [],
        muted: false,
        volume: 1,
        objectUrl,
        audio
    };

    mediaSource.addEventListener("sourceopen", () => {
        try {
            state.sourceBuffer = mediaSource.addSourceBuffer(supportedMimeType);
            state.sourceBuffer.mode = "sequence";
            state.sourceBuffer.addEventListener("updateend", () => appendStreamChunk(peerUUID));
            appendStreamChunk(peerUUID);
        } catch (err) {
            console.warn("Failed to initialize remote audio SourceBuffer", err);
            destroyRemoteStream(peerUUID);
        }
    }, { once: true });

    audio.play().catch(() => {});

    remoteAudioStreams.set(peerUUID, state);
    remoteAudio.set(peerUUID, audio);
    return state;
}

function startRecorderForBitrate(bitrateKbps) {
    if (!localStream || bitrateKbps <= 0) {
        return;
    }

    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }

    const recorderCandidates = [
        "audio/webm;codecs=opus",
        "audio/ogg;codecs=opus"
    ];

    const supportedRecorderMime = recorderCandidates.find(type => {
        return window.MediaRecorder && typeof MediaRecorder.isTypeSupported === "function" && MediaRecorder.isTypeSupported(type);
    });

    const options = {
        audioBitsPerSecond: bitrateKbps * 1000
    };

    if (supportedRecorderMime) {
        options.mimeType = supportedRecorderMime;
    }

    try {
        mediaRecorder = new MediaRecorder(localStream, options);
    } catch (err) {
        console.warn("Falling back to default MediaRecorder options", err);
        mediaRecorder = new MediaRecorder(localStream);
    }

    recorderMimeType = mediaRecorder.mimeType || options.mimeType || "audio/webm;codecs=opus";

    mediaRecorder.ondataavailable = async event => {
        if (!event.data || event.data.size === 0 || isMuted || bitrateKbps <= 0) {
            return;
        }

        const audioBuffer = await event.data.arrayBuffer();
        socket.emit("audio", {
            audio: audioBuffer,
            mimeType: recorderMimeType
        });
    };

    mediaRecorder.start(250);
    recorderBitrate = bitrateKbps;
}

function normalizeIncomingAudioChunk(audioChunk) {
    if (!audioChunk) {
        return null;
    }

    if (audioChunk instanceof Blob || audioChunk instanceof ArrayBuffer || audioChunk instanceof Uint8Array) {
        return audioChunk;
    }

    if (Array.isArray(audioChunk) && audioChunk.every(x => Number.isInteger(x) && x >= 0 && x <= 255)) {
        return new Uint8Array(audioChunk);
    }

    if (audioChunk.type === "Buffer" && Array.isArray(audioChunk.data)) {
        return new Uint8Array(audioChunk.data);
    }

    if (typeof audioChunk === "string") {
        try {
            const binary = atob(audioChunk);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes;
        } catch (_) {
            return null;
        }
    }

    return null;
}

function updateRemoteAudio(peerUUID, audioChunk, mimeType) {
    if (peerUUID === mc_uuid) {
        return;
    }

    const normalizedChunk = normalizeIncomingAudioChunk(audioChunk);
    if (!normalizedChunk) {
        return;
    }

    const state = getOrCreateRemoteState(peerUUID, mimeType);
    if (!state) {
        return;
    }

    const chunkBytes = normalizedChunk instanceof Uint8Array ? normalizedChunk : new Uint8Array(normalizedChunk);
    state.queue.push(chunkBytes);

    if (state.queue.length > 128) {
        state.queue.splice(0, state.queue.length - 128);
    }

    appendStreamChunk(peerUUID);
}

function removePlayer(peerUUID) {
    if (peerUUID === mc_uuid) {
        return;
    }

    const audio = remoteAudio.get(peerUUID);
    if (audio) {
        audio.pause();
    }

    destroyRemoteStream(peerUUID);

    const userDiv = document.getElementById(peerUUID);
    if (userDiv) {
        userDiv.remove();
    }

    players.delete(peerUUID);
}

try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    console.log("Microphone ready", localStream);
} catch (err) {
    console.error("Failed to get microphone", err);
}

socket.emit("join", `voice-${world_uuid}`, mc_uuid, authToken);

const micSelect = document.getElementById("mic-select");

navigator.mediaDevices.enumerateDevices()
    .then(devices => {
        const mics = devices.filter(d => d.kind === "audioinput");
        mics.forEach(mic => {
            const option = document.createElement("option");
            option.value = mic.deviceId;
            option.textContent = mic.label || `Microphone ${micSelect.length + 1}`;
            micSelect.appendChild(option);
        });
    })
    .catch(console.error);

const muteBtn = document.getElementById("mute-btn");
const deafenBtn = document.getElementById("deafen-btn");

muteBtn.onclick = () => {
    isMuted = !isMuted;

    if (localStream) {
        localStream.getAudioTracks().forEach(track => {
            track.enabled = !isMuted;
        });
    }

    muteBtn.textContent = isMuted ? "Unmute" : "Mute";
};

deafenBtn.onclick = () => {
    isDeafened = !isDeafened;
    remoteAudioStreams.forEach(state => {
        if (state.audio) {
            state.audio.muted = isDeafened || state.muted;
        }
    });
    deafenBtn.textContent = isDeafened ? "Undeafen" : "Deafen";
};

socket.on("voice-status", state => {
    if (!state || !state.enabled) {
        stopRecorder();
        return;
    }

    if (state.bitrate_kbps && state.bitrate_kbps !== recorderBitrate) {
        startRecorderForBitrate(state.bitrate_kbps);
    }
});

socket.on("audio", data => {
    if (!data) {
        return;
    }

    if (Array.isArray(data) && data.length >= 2) {
        const [from, audioChunk] = data;
        if (from === mc_uuid) {
            return;
        }

        updateRemoteAudio(from, audioChunk, recorderMimeType);
        return;
    }

    if (data.from && data.audio) {
        if (data.from === mc_uuid) {
            return;
        }

        updateRemoteAudio(data.from, data.audio, data.mimeType || recorderMimeType);
        return;
    }

    if (data instanceof ArrayBuffer || data instanceof Blob || data instanceof Uint8Array) {
        updateRemoteAudio("remote", data, recorderMimeType);
    }
});

socket.on("update", data => {
    const activePlayerUUIDs = new Set();

    data.forEach(player => {
        activePlayerUUIDs.add(player.uuid);

        if (player.uuid === mc_uuid) {
            localPlayer.position = player.Pos;
            localPlayer.rotation = player.Rot;
            localPlayer.name = player.Name;
            return;
        }

        players.set(player.uuid, {
            name: player.Name,
            position: player.Pos,
            rotation: player.Rot
        });

        if (!document.getElementById(player.uuid)) {
            const userDiv = document.createElement("div");
            userDiv.id = player.uuid;

            const headImg = document.createElement("img");
            headImg.src = `https://mc-heads.net/avatar/${player.uuid}/256`;
            headImg.width = 32;
            headImg.height = 32;
            headImg.style.borderRadius = "15%";
            headImg.style.verticalAlign = "middle";
            userDiv.appendChild(headImg);

            const nameSpan = document.createElement("span");
            nameSpan.textContent = ` ${player.Name} `;
            userDiv.appendChild(nameSpan);

            const muteBtn = document.createElement("button");
            muteBtn.textContent = "🔊";
            muteBtn.dataset.muted = false;
            muteBtn.onclick = () => {
                muteBtn.dataset.muted = muteBtn.dataset.muted === "true" ? "false" : "true";
                muteBtn.textContent = muteBtn.dataset.muted === "true" ? "🔇" : "🔊";
                const state = remoteAudioStreams.get(player.uuid);
                if (state) {
                    state.muted = muteBtn.dataset.muted === "true";
                    if (state.audio) {
                        state.audio.muted = isDeafened || state.muted;
                    }
                }
            };
            userDiv.appendChild(muteBtn);

            const volumeSlider = document.createElement("input");
            volumeSlider.type = "range";
            volumeSlider.min = 0;
            volumeSlider.max = 2;
            volumeSlider.step = 0.01;
            volumeSlider.value = 1;
            volumeSlider.oninput = () => {
                const state = remoteAudioStreams.get(player.uuid);
                if (state) {
                    state.volume = parseFloat(volumeSlider.value);
                    if (state.audio) {
                        state.audio.volume = state.volume;
                    }
                }
            };
            userDiv.appendChild(volumeSlider);

            connectedUsers.appendChild(userDiv);
        }
    });

    players.forEach((_, playerUUID) => {
        if (playerUUID !== mc_uuid && !activePlayerUUIDs.has(playerUUID)) {
            removePlayer(playerUUID);
        }
    });

    document.getElementById("local-player-text").innerText = localPlayer.name;

    if (!activePlayerUUIDs.has(mc_uuid)) {
        window.close();
    }
});

});
</script>
</body>
</html>
