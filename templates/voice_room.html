<body>
    <nav class="navbar">
        <div class="logo">
            <a href="https://aspectofthe.site/" class="logo">
                <img src="{{ url_for('static', filename='icons/favicon.png') }}" alt="Logo" class="logo-img">
            </a>
            Aspect's Site

    <h2>Voice Room</h2>
    <h3>{{ world_uuid }}</h3>
    <p>{{ mc_uuid }}</p>
    <p>Peer to Peer Voice Chat</p>
    <div id="voice-controls" style="margin: 10px 0;">
        <button class="generic" id="mute-btn">Mute</button>
        <button class="generic" id="deafen-btn">Deafen</button>
        <label for="mic-select">Mic:</label>
        <select class="dropdown" id="mic-select"></select>
    </div>
    
    <div id="connected-users" style="margin-top: 10px;">
        <h4>Connected Users</h4>
    </div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {

const world_uuid = "{{ world_uuid }}";
const mc_uuid = "{{ mc_uuid }}";
const authToken = "{{ auth }}";

const socket = io("https://aspectofthe.site", { transports: ["websocket"] });

const connectedUsers = document.getElementById("connected-users");

const peers = new Map();
const peerAudio = new Map();
const spatialNodes = new Map();

const players = new Map(); // uuid => {name, position, rotation}
const localPlayer = {
    uuid: mc_uuid,
    name: "You",
    position: [0, 0, 0],
    rotation: [0, 0]
};

let localStream = null;
let audioContext = null;

let isMuted = false;
let isDeafened = false;

async function ensureAudioReady() {
    const context = ensureAudioContext();

    if (context.state === "suspended") {
        try {
            await context.resume();
        } catch (err) {
            console.error("Audio context resume failed:", err);
        }
    }

    return context;
}

function ensureAudioContext() {
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (audioContext.state === "suspended") {
        audioContext.resume().catch(console.error);
    }

    return audioContext;
}

function updateListener() {
    if (!audioContext) {
        return;
    }

    const [x, y, z] = localPlayer.position || [0, 0, 0];
    const [pitch, yaw] = localPlayer.rotation || [0, 0];
    const pitchRad = (pitch * Math.PI) / 180;
    const yawRad = (yaw * Math.PI) / 180;

    if (typeof audioContext.listener.setPosition === "function") {
        audioContext.listener.setPosition(x, y, z);
    } else if (audioContext.listener.positionX) {
        audioContext.listener.positionX.value = x;
        audioContext.listener.positionY.value = y;
        audioContext.listener.positionZ.value = z;
    }

    if (typeof audioContext.listener.setOrientation === "function") {
        audioContext.listener.setOrientation(
            Math.sin(yawRad),
            -Math.sin(pitchRad),
            Math.cos(yawRad),
            0,
            1,
            0
        );
    } else if (audioContext.listener.forwardX) {
        audioContext.listener.forwardX.value = Math.sin(yawRad);
        audioContext.listener.forwardY.value = -Math.sin(pitchRad);
        audioContext.listener.forwardZ.value = Math.cos(yawRad);
        audioContext.listener.upX.value = 0;
        audioContext.listener.upY.value = 1;
        audioContext.listener.upZ.value = 0;
    }
}

//// Get microphone

try {
    localStream = await navigator.mediaDevices.getUserMedia({
        audio: true
    });

    await ensureAudioReady();

    console.log("Got microphone:", localStream);
}
catch (err) {
    console.error("Failed to get microphone:", err);
}

socket.emit(
    "join",
    room=`voice-${world_uuid}`,
    uuid=mc_uuid,
    auth=authToken
)

//// Microphone selector

const micSelect = document.getElementById("mic-select");

navigator.mediaDevices.enumerateDevices()
.then(devices => {
    const mics = devices.filter(d => d.kind === "audioinput");

    mics.forEach(mic => {
        const option = document.createElement("option");
        option.value = mic.deviceId;
        option.textContent =
            mic.label || `Microphone ${micSelect.length + 1}`;
        micSelect.appendChild(option);
    });
})
.catch(console.error);

//// Local User Mute/Deafen

const muteBtn = document.getElementById("mute-btn");
const deafenBtn = document.getElementById("deafen-btn");

document.addEventListener("pointerdown", () => {
    ensureAudioReady().catch(console.error);
}, { once: true });

muteBtn.onclick = () => {
    ensureAudioReady().catch(console.error);

    isMuted = !isMuted;

    if (localStream) {
        localStream.getAudioTracks().forEach(track => {
            track.enabled = !isMuted;
        });
    }

    muteBtn.textContent = isMuted ? "Unmute" : "Mute";
};

deafenBtn.onclick = () => {
    ensureAudioReady().catch(console.error);

    isDeafened = !isDeafened;

    peerAudio.forEach(audio => {
        audio.muted = isDeafened;
    });

    deafenBtn.textContent = isDeafened ? "Undeafen" : "Deafen";
};

//// Existing peers (when joining)

socket.on("existing-peers", existingPeers => {
    console.log("Existing peers:", existingPeers);

    existingPeers.forEach(peerUUID => {
        createPeerConnection(peerUUID, true);
    });
});

//// New peer joined

socket.on("new-peer", peerUUID => {
    console.log("New peer:", peerUUID);

    if (!peers.has(peerUUID)) {
        createPeerConnection(peerUUID, false);
    }

});

//// Peer left

function removePlayer(peerUUID) {
    if (peerUUID === mc_uuid) {
        return;
    }

    const pc = peers.get(peerUUID);
    if (pc) {
        pc.close();
        peers.delete(peerUUID);
    }

    const audio = peerAudio.get(peerUUID);
    if (audio) {
        if (typeof audio.stop === "function") {
            audio.stop();
        } else if (audio.getTracks) {
            audio.getTracks().forEach(track => track.stop());
        }
        peerAudio.delete(peerUUID);
    }

    const userDiv = document.getElementById(peerUUID);
    if (userDiv) {
        userDiv.remove();
    }

    players.delete(peerUUID);
}

socket.on("peer-left", peerUUID => {
    removePlayer(peerUUID);
});

//// Incoming signaling

socket.on("signal", async data => {
    const peerUUID = data.from;
    const signal = data.signal;

    let pc = peers.get(peerUUID);

    if (!pc) {
        pc = createPeerConnection(peerUUID, false);
    }

    try {
        switch (signal.type) {
            case "offer":
                await pc.setRemoteDescription(
                    new RTCSessionDescription(signal.sdp)
                );

                const answer = await pc.createAnswer();

                await pc.setLocalDescription(answer);

                socket.emit("signal", {
                    to: peerUUID,
                    from: mc_uuid,
                    auth: authToken,
                    signal: {
                        type: "answer",
                        sdp: pc.localDescription
                    }
                });
                break;
            case "answer":
                await pc.setRemoteDescription(
                    new RTCSessionDescription(signal.sdp)
                );
                break;
            case "ice-candidate":

                if (signal.candidate) {
                    await pc.addIceCandidate(
                        new RTCIceCandidate(signal.candidate)
                    );
                }
                break;
        }

    }
    catch (err) {
        console.error("Signal error:", err);
    }
});

//// Create Peer Connection

function createPeerConnection(peerUUID, initiator) {
    if (peers.has(peerUUID)) {
        return peers.get(peerUUID);
    }

    const pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
    peers.set(peerUUID, pc);

    // Add microphone track
    if (localStream) {
        localStream.getTracks().forEach(track => {
            pc.addTrack(track, localStream);
        });

    }

    // ICE candidates
    pc.onicecandidate = event => {
        if (!event.candidate)
            return;

        socket.emit("signal", {
            to: peerUUID,
            from: mc_uuid,
            auth: authToken,
            signal: {
                type: "ice-candidate",
                candidate: event.candidate
            }
        });
    };

    // audio track received
    pc.ontrack = event => {
        const stream = event.streams[0];

        if (!stream) {
            return;
        }

        peerAudio.set(peerUUID, stream);

        ensureAudioReady()
            .then(() => spatialAudio(stream, peerUUID))
            .catch(console.error);
    };

    // create offer
    if (initiator) {
        (async () => {
            try {
                const offer = await pc.createOffer();

                await pc.setLocalDescription(offer);

                socket.emit("signal", {
                    to: peerUUID,
                    from: mc_uuid,
                    auth: authToken,
                    signal: {
                        type: "offer",
                        sdp: pc.localDescription
                    }
                });
            }
            catch (err) {
                console.error(err);
            }
        })();
    }

    return pc;
}

//// Updates
/*
    Each user recieves this information each update:
    [{"Pos":[x,y,z],"Rot":[x,y],"Name":"PlayerUsername","uuid":"player-uuid"},{...}...]
    List of Dictionaries. Each dictionary is the data of one player.
*/
socket.on("update", data => {
    //console.debug("Voice update:", data);

    const activePlayerUUIDs = new Set();

    // update player information
    data.forEach(player => {
        activePlayerUUIDs.add(player.uuid);

        // only update if player is connected
        if (player.uuid !== mc_uuid && !peers.has(player.uuid)) {
            return;
        }

        if (player.uuid === mc_uuid) {
            localPlayer.position = player.Pos; // this players pos [x,y,z]
            localPlayer.rotation = player.Rot; // this players rot [x_rot,y_rot]
            localPlayer.name = player.Name;
        } else {
            players.set(player.uuid, {
                name: player.Name,
                position: player.Pos, // other players pos [x,y,z]
                rotation: player.Rot // other players rot [x_rot,y_rot]
            });
            // update connected users list
            if (!document.getElementById(player.uuid)) {
                const UserDiv = document.createElement("div");
                UserDiv.id = player.uuid;
                // head
                const headImg = document.createElement("img");
                headImg.src = `https://mc-heads.net/avatar/${player.uuid}/256`;
                headImg.width = 32;
                headImg.height = 32;
                headImg.style.borderRadius = "15%";
                headImg.style.verticalAlign = "middle";
                UserDiv.appendChild(headImg);
                // name
                const nameSpan = document.createElement("span");
                nameSpan.textContent = ` ${player.Name} `;
                UserDiv.appendChild(nameSpan);
                // mute button (press to toggle mute for this player)
                const muteBtn = document.createElement("button");
                muteBtn.textContent = "🔊"; // change this to svg later
                muteBtn.dataset.muted = false;
                muteBtn.onclick = () => {
                    muteBtn.dataset.muted = !muteBtn.dataset.muted;
                    muteBtn.textContent = muteBtn.dataset.muted ? "🔇" : "🔊"; // temp, replace with svgs later
                    const userDiv = document.getElementById(player.uuid);
                    if (userDiv) {
                        const volumeSlider = userDiv.querySelector('input[type="range"]');
                        if (volumeSlider) {
                            if (muteBtn.dataset.muted === true) {
                                volumeSlider.dataset.prevValue = volumeSlider.value;
                                volumeSlider.value = 0;
                            } else {
                                if (volumeSlider.dataset.prevValue === 0 || !volumeSlider.dataset.prevValue) {
                                    volumeSlider.dataset.prevValue = 1;
                                } else {
                                    volumeSlider.value = volumeSlider.dataset.prevValue;
                                }
                            }
                        }
                    }
                };
                UserDiv.appendChild(muteBtn);
                // volume slider (todo style this later) (todo make this change the overall volume for this player)
                const volumeSlider = document.createElement("input");
                volumeSlider.type = "range";
                volumeSlider.min = 0; // min 0% (mute)
                volumeSlider.max = 2; // max 200% allowing louder if necessary
                volumeSlider.step = 0.01; // step by 1%
                volumeSlider.value = 1; // default 100%
                volumeSlider.oninput = () => {
                    if (volumeSlider.value === 0) {
                        muteBtn.textContent = "🔇";
                    } else {
                        muteBtn.textContent = "🔊";
                    }
                };
                UserDiv.appendChild(volumeSlider);
                // options
                const optionsBtn = document.createElement("button");
                optionsBtn.textContent = "…"; // change this to svg later
                UserDiv.appendChild(optionsBtn);

                connectedUsers.appendChild(UserDiv);
            }
        }
    });

    updateListener();

    players.forEach((_, playerUUID) => {
        if (playerUUID !== mc_uuid && !activePlayerUUIDs.has(playerUUID)) {
            removePlayer(playerUUID);
        } else if (playerUUID !== mc_uuid) {
            updateSpatialAudioForPeer(playerUUID);
        }
    });

    if (!activePlayerUUIDs.has(mc_uuid)) {
        // close the browser tab if the game says this player is no longer in the voice room
        window.close();
    }
});

//// Spatial Audio

function spatialAudio(stream, peerUUID) { // Create Initial Panner Node
    /** @type {AudioContext} */
    const context = ensureAudioContext();

    if (spatialNodes.has(peerUUID)) {
        updateSpatialAudioForPeer(peerUUID);
        otherEffects(peerUUID);
        return;
    }

    const source = context.createMediaStreamSource(stream);
    const panner = context.createPanner();
    const gain = context.createGain();

    panner.panningModel = "HRTF";
    panner.distanceModel = "inverse";
    panner.refDistance = 1;
    // 16 is the maximum distance you can hear most sounds in minecraft. Simple voice chat uses 48. This will be configurable by the world
    panner.maxDistance = 16; // subject to change
    panner.rolloffFactor = 1;
    panner.coneInnerAngle = 120;
    panner.coneOuterAngle = 360;
    panner.coneOuterGain = 0.2;

    gain.gain.value = 1;

    source.connect(panner);
    panner.connect(gain);
    gain.connect(context.destination);

    spatialNodes.set(peerUUID, { source, panner, gain });

    updateSpatialAudioForPeer(peerUUID);
    otherEffects(peerUUID);
}

function updateSpatialAudioForPeer(peerUUID) {
    // Modify Panner Node to peer's position
    const node = spatialNodes.get(peerUUID);
    const playerData = players.get(peerUUID);

    if (!node || !playerData) {
        return;
    }

    const [x, y, z] = localPlayer.position || [0, 0, 0];
    const [peerX, peerY, peerZ] = playerData.position || [0, 0, 0];
    const [pitch, yaw] = playerData.rotation || [0, 0];

    const dx = peerX - x;
    const dy = peerY - y;
    const dz = peerZ - z;
    //const distance = Math.sqrt(dx * dx + dz * dz + dy * dy);
    //const volume = Math.max(0.05, 1 - (distance / 15));

    const yawRad = (yaw * Math.PI) / 180;
    const pitchRad = (pitch * Math.PI) / 180;

    node.panner.positionX.value = dx;
    node.panner.positionY.value = dy;
    node.panner.positionZ.value = dz;
    node.panner.orientationX.value = Math.sin(yawRad); // maybe shouldn't be radians might have to check this
    node.panner.orientationY.value = -Math.sin(pitchRad); // maybe shouldn't be radians might have to check this
    node.panner.orientationZ.value = Math.cos(yawRad); // maybe shouldn't be radians might have to check this

    console.debug(`Updated node for ${peerUUID}: `, JSON.stringify({
        positionX: node.panner.positionX.value,
        positionY: node.panner.positionY.value,
        positionZ: node.panner.positionZ.value,
        orientationX: node.panner.orientationX.value,
        orientationY: node.panner.orientationY.value,
        orientationZ: node.panner.orientationZ.value,
    })); // temp
    
    //node.gain.gain.value = volume;
}

//// Other Audio Effects if applicable (echo, reverb, etc)

function otherEffects(audioElement, peerUUID) {
    /*// Volume Slider
    const userDiv = document.getElementById(peerUUID);
    if (!userDiv) return;
    const volumeSlider = userDiv.querySelector('input[type="range"]');
    if (volumeSlider) {
        volumeSlider.oninput = () => {// TODO Audio will not go above 100% volume this way
            audioElement.volume = volumeSlider.value;
        };
    }*/
}

});
</script>
