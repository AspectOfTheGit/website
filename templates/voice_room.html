<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspect's Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/favicon.png') }}">
</head>
<footer class="site-footer">
  <div class="footer-left">
    <a href="https://store.legitimoose.com" target="_blank" rel="noopener noreferrer">
        <img src="{{ url_for('static', filename='icons/cart.svg') }}" alt="Store" width="64" height="64">
    </a>
  </div>

  <div class="footer-center">
    <p>
      This is not an official Moose project and is made by the community.<br>
      We have no affiliation with any real-world brands.<br>
      Not affiliated with Mojang AB or Partners.
    </p>
  </div>

  <div class="footer-right">
    <a href="https://www.youtube.com/@Legitimoose" target="_blank" rel="noopener noreferrer">
        <img src="{{ url_for('static', filename='icons/youtube.svg') }}" alt="YouTube" width="64" height="64">
    </a>
  </div>
</footer>

<body>
    <nav class="navbar">
        <div class="logo">
            <a href="https://aspectofthe.site/" class="logo">
                <img src="{{ url_for('static', filename='icons/favicon.png') }}" alt="Logo" class="logo-img">
            </a>
            Aspect's Site
        </div>
    </nav>

    <h2>Voice Room</h2>
    <h3 id="world-uuid-text">{{ world_uuid }}</h3>
    <p id="local-player-text">{{ mc_uuid }}</p>
    <p>Voice Chat for legitimoose.com</p>
    <div id="voice-controls" style="margin: 10px 0;">
        <button class="generic" id="mute-btn">Mute</button>
        <button class="generic" id="deafen-btn">Deafen</button>
        <label for="mic-select">Mic:</label>
        <select class="dropdown" id="mic-select"></select>
    </div>
    
    <div id="connected-users" style="margin-top: 10px;">
        <h4>Connected Users</h4>
    </div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {

const world_uuid = "{{ world_uuid }}";
const mc_uuid = "{{ mc_uuid }}";
const authToken = "{{ auth }}";

const socket = io("https://aspectofthe.site", { transports: ["websocket"] });
const connectedUsers = document.getElementById("connected-users");

const players = new Map();
const remoteAudio = new Map();
const localPlayer = {
    uuid: mc_uuid,
    name: "You",
    position: [0, 0, 0],
    rotation: [0, 0]
};

let localStream = null;
let mediaRecorder = null;
let recorderBitrate = 0;
let isMuted = false;
let isDeafened = false;

function ensureAudioContext() {
    if (!window.AudioContext && !window.webkitAudioContext) {
        return null;
    }

    if (!window.__voiceAudioContext) {
        window.__voiceAudioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (window.__voiceAudioContext.state === "suspended") {
        window.__voiceAudioContext.resume().catch(console.error);
    }

    return window.__voiceAudioContext;
}

function stopRecorder() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }
}

function startRecorderForBitrate(bitrateKbps) {
    if (!localStream || bitrateKbps <= 0) {
        return;
    }

    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }

    const options = {
        mimeType: "audio/webm;codecs=opus",
        audioBitsPerSecond: bitrateKbps * 1000
    };

    try {
        mediaRecorder = new MediaRecorder(localStream, options);
    } catch (err) {
        console.warn("Falling back to default MediaRecorder options", err);
        mediaRecorder = new MediaRecorder(localStream);
    }

    mediaRecorder.ondataavailable = async event => {
        if (!event.data || event.data.size === 0 || isMuted || bitrateKbps <= 0) {
            return;
        }

        const audioBuffer = await event.data.arrayBuffer();
        socket.emit("audio", audioBuffer);
    };

    mediaRecorder.start(250);
    recorderBitrate = bitrateKbps;
}

function updateRemoteAudio(peerUUID, audioChunk) {
    if (peerUUID === mc_uuid) {
        return;
    }

    const blob = new Blob([audioChunk], { type: "audio/webm;codecs=opus" });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.autoplay = true;
    audio.muted = isDeafened;
    audio.play().catch(() => {});

    const previous = remoteAudio.get(peerUUID);
    if (previous) {
        previous.pause();
        URL.revokeObjectURL(previous.src);
    }

    remoteAudio.set(peerUUID, audio);

    audio.onended = () => URL.revokeObjectURL(url);
}

function removePlayer(peerUUID) {
    if (peerUUID === mc_uuid) {
        return;
    }

    const audio = remoteAudio.get(peerUUID);
    if (audio) {
        audio.pause();
        if (audio.src) {
            URL.revokeObjectURL(audio.src);
        }
        remoteAudio.delete(peerUUID);
    }

    const userDiv = document.getElementById(peerUUID);
    if (userDiv) {
        userDiv.remove();
    }

    players.delete(peerUUID);
}

try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    console.log("Microphone ready", localStream);
} catch (err) {
    console.error("Failed to get microphone", err);
}

socket.emit("join", `voice-${world_uuid}`, mc_uuid, authToken);

const micSelect = document.getElementById("mic-select");

navigator.mediaDevices.enumerateDevices()
    .then(devices => {
        const mics = devices.filter(d => d.kind === "audioinput");
        mics.forEach(mic => {
            const option = document.createElement("option");
            option.value = mic.deviceId;
            option.textContent = mic.label || `Microphone ${micSelect.length + 1}`;
            micSelect.appendChild(option);
        });
    })
    .catch(console.error);

const muteBtn = document.getElementById("mute-btn");
const deafenBtn = document.getElementById("deafen-btn");

muteBtn.onclick = () => {
    isMuted = !isMuted;

    if (localStream) {
        localStream.getAudioTracks().forEach(track => {
            track.enabled = !isMuted;
        });
    }

    muteBtn.textContent = isMuted ? "Unmute" : "Mute";
};

deafenBtn.onclick = () => {
    isDeafened = !isDeafened;
    remoteAudio.forEach(audio => {
        audio.muted = isDeafened;
    });
    deafenBtn.textContent = isDeafened ? "Undeafen" : "Deafen";
};

socket.on("voice-status", state => {
    if (!state || !state.enabled) {
        stopRecorder();
        return;
    }

    if (state.bitrate_kbps && state.bitrate_kbps !== recorderBitrate) {
        startRecorderForBitrate(state.bitrate_kbps);
    }
});

socket.on("audio", data => {
    if (!data) {
        return;
    }

    if (Array.isArray(data) && data.length >= 2) {
        const [from, audioChunk] = data;
        if (from === mc_uuid) {
            return;
        }

        updateRemoteAudio(from, audioChunk);
        return;
    }

    if (data.from && data.audio) {
        if (data.from === mc_uuid) {
            return;
        }

        updateRemoteAudio(data.from, data.audio);
        return;
    }

    if (data instanceof ArrayBuffer || data instanceof Blob || data instanceof Uint8Array) {
        updateRemoteAudio("remote", data);
    }
});

socket.on("update", data => {
    const activePlayerUUIDs = new Set();

    data.forEach(player => {
        activePlayerUUIDs.add(player.uuid);

        if (player.uuid === mc_uuid) {
            localPlayer.position = player.Pos;
            localPlayer.rotation = player.Rot;
            localPlayer.name = player.Name;
            return;
        }

        players.set(player.uuid, {
            name: player.Name,
            position: player.Pos,
            rotation: player.Rot
        });

        if (!document.getElementById(player.uuid)) {
            const userDiv = document.createElement("div");
            userDiv.id = player.uuid;

            const headImg = document.createElement("img");
            headImg.src = `https://mc-heads.net/avatar/${player.uuid}/256`;
            headImg.width = 32;
            headImg.height = 32;
            headImg.style.borderRadius = "15%";
            headImg.style.verticalAlign = "middle";
            userDiv.appendChild(headImg);

            const nameSpan = document.createElement("span");
            nameSpan.textContent = ` ${player.Name} `;
            userDiv.appendChild(nameSpan);

            const muteBtn = document.createElement("button");
            muteBtn.textContent = "🔊";
            muteBtn.dataset.muted = false;
            muteBtn.onclick = () => {
                muteBtn.dataset.muted = !muteBtn.dataset.muted;
                muteBtn.textContent = muteBtn.dataset.muted ? "🔇" : "🔊";
                const audio = remoteAudio.get(player.uuid);
                if (audio) {
                    audio.muted = muteBtn.dataset.muted === "true";
                }
            };
            userDiv.appendChild(muteBtn);

            const volumeSlider = document.createElement("input");
            volumeSlider.type = "range";
            volumeSlider.min = 0;
            volumeSlider.max = 2;
            volumeSlider.step = 0.01;
            volumeSlider.value = 1;
            volumeSlider.oninput = () => {
                const audio = remoteAudio.get(player.uuid);
                if (audio) {
                    audio.volume = parseFloat(volumeSlider.value);
                }
            };
            userDiv.appendChild(volumeSlider);

            connectedUsers.appendChild(userDiv);
        }
    });

    players.forEach((_, playerUUID) => {
        if (playerUUID !== mc_uuid && !activePlayerUUIDs.has(playerUUID)) {
            removePlayer(playerUUID);
        }
    });

    document.getElementById("local-player-text").innerText = localPlayer.name;

    if (!activePlayerUUIDs.has(mc_uuid)) {
        window.close();
    }
});

});
</script>
</body>
</html>
