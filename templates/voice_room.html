<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <a href="https://aspectofthe.site/" class="logo">
                <img src="{{ url_for('static', filename='icons/favicon.png') }}" alt="Logo" class="logo-img">
            </a>
            Aspect's Site
        </div>
    </nav>

    <h2>Voice Room</h2>
    <h3>{{ world_uuid }}</h3>
    <p>{{ mc_uuid }}</p>
    <p>Voice Chat is a big work in progress!</p>
    <div id="voice-controls" style="margin: 10px 0;">
        <button class="generic" id="mute-btn">Mute</button>
        <button class="generic" id="deafen-btn">Deafen</button>
        <label for="mic-select">Mic:</label>
        <select class="dropdown" id="mic-select"></select>
    </div>
    
    <div id="user-volumes" style="margin-top: 10px;">
        <h4>Connected Users</h4>
    </div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {

const socket = io("https://aspectofthe.site", {
    transports: ["websocket"]
});

socket.emit("join", "voice-{{ world_uuid }}");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

document.addEventListener("click", async () => {
    if (audioCtx.state !== "running") {
        await audioCtx.resume();
    }
});

let localStream;
let peers = {};
let audioNodes = {};

let isMuted = false;

const muteBtn = document.getElementById("mute-btn");
const deafenBtn = document.getElementById("deafen-btn");

async function initMic() {
    localStream = await navigator.mediaDevices.getUserMedia({
        audio: true
    });

    applyMute();
}

function applyMute() {
    if (!localStream) return;
    localStream.getAudioTracks().forEach(t => {
        t.enabled = !isMuted;
    });
}

// mute/deafen
muteBtn.onclick = () => {
    isMuted = !isMuted;
    muteBtn.textContent = isMuted ? "Unmute" : "Mute";
    applyMute();
};

deafenBtn.onclick = () => {
    audioCtx.destination.muted = !audioCtx.destination.muted;
    deafenBtn.textContent = audioCtx.destination.muted ? "Undeafen" : "Deafen";
};

await initMic();

// webrtc sockets
socket.on("existing-peers", async (sids) => {
    for (const sid of sids) {
        await createPeer(sid, true);
    }
});

socket.on("new-peer", async (sid) => {
    if (!peers[sid]) {
        await createPeer(sid, false);
    }
});

socket.on("signal", async ({from, signal}) => {
    if (!peers[from]) {
        await createPeer(from, false);
    }

    const pc = peers[from];

    if (signal.type === "offer") {
        await pc.setRemoteDescription(signal);

        const ans = await pc.createAnswer();
        await pc.setLocalDescription(ans);

        socket.emit("signal", {
            to: from,
            signal: pc.localDescription
        });

    } else if (signal.type === "answer") {
        await pc.setRemoteDescription(signal);

    } else if (signal.candidate) {
        try {
            await pc.addIceCandidate(signal.candidate);
        } catch {}
    }
});

// create peer
async function createPeer(sid, initiator) {

    const pc = new RTCPeerConnection({
        iceServers: [
            { urls: "stun:stun.l.google.com:19302" }
        ]
    });

    peers[sid] = pc;

    // send mic
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.ontrack = (e) => {
        const stream = e.streams[0];

        const source = audioCtx.createMediaStreamSource(stream);
        const gain = audioCtx.createGain();

        const panner = audioCtx.createPanner();
        panner.panningModel = "HRTF";
        panner.distanceModel = "inverse";
        panner.refDistance = 1;
        panner.rolloffFactor = 1;

        source.connect(gain).connect(panner).connect(audioCtx.destination);

        audioNodes[sid] = { source, gain, panner };

        console.log("voice connected:", sid);
    };

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit("signal", {
                to: sid,
                signal: { candidate: e.candidate }
            });
        }
    };

    if (initiator) {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        socket.emit("signal", {
            to: sid,
            signal: pc.localDescription
        });
    }
}

// update you
function updateListener(pos, forward) {
    const l = audioCtx.listener;

    if (l.positionX) {
        l.positionX.value = pos[0];
        l.positionY.value = pos[1];
        l.positionZ.value = pos[2];

        l.forwardX.value = forward[0];
        l.forwardY.value = forward[1];
        l.forwardZ.value = forward[2];

        l.upX.value = 0;
        l.upY.value = 1;
        l.upZ.value = 0;
    } else {
        l.setPosition(pos[0], pos[1], pos[2]);
        l.setOrientation(
            forward[0], forward[1], forward[2],
            0, 1, 0
        );
    }
}

// update everyone else
socket.on("update", (players) => {

    let me = null;

    for (const p of players) {

        const sid = p.uuid;
        const pos = p.Pos;
        const rot = p.Rot;

        if (p.self || p.Name === "YOU") {
            me = { pos, rot };
            continue;
        }

        const node = audioNodes[sid];

        if (node) {
            const panner = node.panner;

            if (panner.positionX) {
                panner.positionX.value = pos[0];
                panner.positionY.value = pos[1];
                panner.positionZ.value = pos[2];
            } else {
                panner.setPosition(pos[0], pos[1], pos[2]);
            }
        }
    }

    if (me) {
        const yaw = me.rot[1];

        const forward = [
            Math.sin(yaw),
            0,
            Math.cos(yaw)
        ];

        updateListener(me.pos, forward);
    }
});

document.addEventListener("click", async () => {
    if (audioCtx.state !== "running") {
        await audioCtx.resume();
    }
});

});
</script>
</body>
</html>
